# Quartermaster workspace root (Marginalia #238) — the PROVISIONING companion to
# Bosun (#227). Where Bosun runs/observes/controls what's aboard, Quartermaster
# stocks the ship: host-capability pre-flight (`quartermaster verify`), and
# (next) build+ship of artifacts. The seam is documented at
# ShapedSteer/bosun/docs/PROVISIONING-SEAM.md; the shared vocabulary (the artifact
# model + Target/host identity + the ingest adapters) is path-imported from the
# Bosun workspace next door rather than duplicated.
#
# Same ethos as Bosun: typed model, pure core, thin effectful edge, develop on
# node, with purescript-go (backend-go) as a Node-free native column.
workspace:
  packageSet:
    registry: 77.13.1
  extraPackages:
    bosun-core:
      path: ../bosun/core
    bosun-adapters:
      path: ../bosun/adapters
    # bosun-core depends on bosun-protocol; path packages aren't transitively
    # auto-registered, so the workspace must declare it explicitly too.
    bosun-protocol:
      path: ../bosun/protocol
